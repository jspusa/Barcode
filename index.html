<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業條碼產生器</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(#ffffff, #e2e8f0);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        input {
            width: 200px;
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #2b6cb0;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2c5282;
        }
        #barcode {
            margin-top: 30px;
            background: #fff;
        }
        #checksum-display {
            margin-top: 10px;
            margin-bottom: 10px;
            color: #2d3748;
            display: block;
        }
        footer {
            margin-top: 40px;
            font-size: 12px;
            color: #a0aec0;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>EAN-13 條碼產生器</h1>
        <label for="barcode-input">請輸入前 12 位數字：</label><br/>
        <input type="text" id="barcode-input" maxlength="12" value="471307706632" oninput="calculateChecksum()" onkeydown="handleEnter(event)" />
        <div>
            <button onclick="generateBarcode()">產生條碼</button>
            <a id="download-link" download="barcode.svg" style="display:none;"><button>下載 SVG</button></a>
            <button id="download-pdf-button" onclick="downloadLabelPdf()" style="display:none;">下載 4x6 標籤 PDF（11x35mm）</button>
        </div>
        <div id="checksum-display"></div>
        <svg id="barcode"></svg>
        <footer>Generated with JsBarcode</footer>
    </div>
<script>
function handleEnter(e) {
    if(e.key === 'Enter') {
        generateBarcode();
    }
}
function calculateChecksum() {
    const input = document.getElementById('barcode-input').value;
    if (/^\d{12}$/.test(input)) {
        let sum = 0;
        for (let i = 0; i < 12; i++) {
            const digit = parseInt(input[i], 10);
            sum += i % 2 === 0 ? digit : digit * 3;
        }
        const checksum = (10 - (sum % 10)) % 10;
        document.getElementById('checksum-display').textContent = '檢查碼: ' + checksum;
    } else {
        document.getElementById('checksum-display').textContent = '';
    }
}
function generateBarcode() {
    let input = getBarcodeValue();
    if (!input) {
        alert('請輸入 12 位數字');
        return;
    }
    renderBarcode(input);
    const serializer = new XMLSerializer();
    const svg = document.getElementById('barcode');
    const url = URL.createObjectURL(new Blob([serializer.serializeToString(svg)], { type: 'image/svg+xml' }));
    const link = document.getElementById('download-link');
    link.href = url;
    link.style.display = 'inline-block';
    document.getElementById('download-pdf-button').style.display = 'inline-block';
}
function getBarcodeValue() {
    let input = document.getElementById('barcode-input').value;
    if (/^\d{12}$/.test(input)) {
        let sum = 0;
        for (let i = 0; i < 12; i++) {
            const digit = parseInt(input[i], 10);
            sum += i % 2 === 0 ? digit : digit * 3;
        }
        const checksum = (10 - (sum % 10)) % 10;
        input += checksum;
        return input;
    }
    return null;
}
function renderBarcode(input) {
    const svg = document.getElementById('barcode');
    JsBarcode(svg, input, { format: 'EAN13', displayValue: false, fontSize: 18 });
    addHumanReadableText(svg, input);
}
function svgToPngDataUrl(svg) {
    return new Promise((resolve, reject) => {
        const serializer = new XMLSerializer();
        const svgData = serializer.serializeToString(svg);
        const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
        const svgUrl = URL.createObjectURL(svgBlob);
        const image = new Image();
        image.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = image.width || 480;
            canvas.height = image.height || 160;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
            URL.revokeObjectURL(svgUrl);
            resolve(canvas.toDataURL('image/png'));
        };
        image.onerror = reject;
        image.src = svgUrl;
    });
}
async function downloadLabelPdf() {
    const input = getBarcodeValue();
    if (!input) {
        alert('請輸入 12 位數字');
        return;
    }
    renderBarcode(input);
    const svg = document.getElementById('barcode');
    const pngDataUrl = await svgToPngDataUrl(svg);
    const { jsPDF } = window.jspdf;
    const pageWidth = 102;
    const pageHeight = 152;
    const barcodeWidth = 35;
    const barcodeHeight = 11;
    const gap = 2;
    const marginX = 3;
    const marginY = 3;
    const cols = Math.floor((pageWidth - marginX * 2 + gap) / (barcodeWidth + gap));
    const rows = Math.floor((pageHeight - marginY * 2 + gap) / (barcodeHeight + gap));
    const pdf = new jsPDF({
        orientation: 'portrait',
        unit: 'mm',
        format: [pageWidth, pageHeight]
    });
    for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
            const x = marginX + col * (barcodeWidth + gap);
            const y = marginY + row * (barcodeHeight + gap);
            pdf.addImage(pngDataUrl, 'PNG', x, y, barcodeWidth, barcodeHeight, undefined, 'FAST');
        }
    }
    pdf.save(`barcode-4x6-${input}.pdf`);
}
function addHumanReadableText(svg, code) {
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('y', '125');
    text.setAttribute('font-size', '18');
    const unitWidth = svg.getBBox().width / 95;
    const pos = [0, 10,16,22,28,34, 40, 51,57,63,69,75,81];
    for (let i=0; i<code.length; i++) {
        const tspan = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
        tspan.setAttribute('x', pos[i] * unitWidth);
        tspan.textContent = code[i];
        text.appendChild(tspan);
    }
    svg.appendChild(text);
}
</script>
</body>
</html>
